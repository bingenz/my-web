name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "share-meta.js"
      - "sync-share-meta.js"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: 0a0f11d97cc9fa3c607e94d2ce84c34d
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify build output
        run: npm run check

      - name: Deploy to Cloudflare Worker
        run: npx wrangler deploy
