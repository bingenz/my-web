name: Encode & Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'index.src.html'
      - 'kho.src.html'

permissions:
  contents: write

jobs:
  encode:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encode src files
        run: node encode-html.js

      - name: Commit encoded files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html kho.html
          git diff --staged --quiet || git commit -m "auto: encode html files [skip ci]"
          git push
